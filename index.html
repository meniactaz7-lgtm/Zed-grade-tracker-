const GRADE_BANDS = [
    { min: 90, max: 100, point: 1, label: "Distinction" },
    { min: 80, max: 89, point: 2, label: "Distinction" },
    { min: 70, max: 79, point: 3, label: "Merit" },
    { min: 60, max: 69, point: 4, label: "Merit" },
    { min: 50, max: 59, point: 5, label: "Credit" },
    { min: 40, max: 49, point: 6, label: "Credit" },
    { min: 30, max: 39, point: 7, label: "Satisfactory" },
    { min: 20, max: 29, point: 8, label: "Satisfactory" },
    { min: 0, max: 19, point: 9, label: "Unsatisfactory" },
];
const PASS_MARK = 40;

function getGrade(score) {
    if (score === null || score === undefined || score === "" || isNaN(score))
        return null;
    const s = Math.max(0, Math.min(100, Number(score)));
    return GRADE_BANDS.find((b) => s >= b.min && s <= b.max) || null;
}

function gradeColor(point) {
    if (point == null) return C.slate;
    if (point <= 2) return "#1B6B3C";
    if (point <= 4) return "#3E8E52";
    if (point <= 6) return C.gold;
    if (point <= 8) return C.copper;
    return C.flagRed;
}

function getDivision(aggregate) {
    if (aggregate <= 16) return { div: "I", label: "Division I", color: "#1B6B3C" };
    if (aggregate <= 22) return { div: "II", label: "Division II", color: "#3E8E52" };
    if (aggregate <= 29) return { div: "III", label: "Division III", color: C.gold };
    if (aggregate <= 34) return { div: "IV", label: "Division IV", color: C.copper };
    return { div: "F", label: "Fail", color: C.flagRed };
}

function autoRemark(avg) {
    if (avg == null) return "";
    if (avg >= 80) return "Excellent performance. Keep up the outstanding work!";
    if (avg >= 70) return "Very good performance this term.";
    if (avg >= 60) return "Good performance. Consistent effort shown.";
    if (avg >= 50) return "Satisfactory performance. There is room to improve.";
    if (avg >= 40) return "Fair performance. More effort is needed.";
    return "Below average. Needs serious improvement and extra support.";
}

function computeStudent(student, subjects) {
    const points = [];
    let sum = 0, count = 0;
    subjects.forEach((sub) => {
        const raw = student.scores ? student.scores[sub] : null;
        if (raw !== null && raw !== undefined && raw !== "") {
            const n = Number(raw);
            const g = getGrade(n);
            if (g) {
                points.push(g.point);
                sum += n;
                count++;
            }
        }
    });
    const avg = count ? sum / count : null;
    let division = null;
    if (subjects.length >= 6 && points.length >= 6) {
        const best6 = [...points].sort((a, b) => a - b).slice(0, 6);
        const aggregate = best6.reduce((a, b) => a + b, 0);
        division = { aggregate, ...getDivision(aggregate) };
    }
    return { avg, count, division, filled: count === subjects.length && subjects.length > 0 };
}

function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }

function hashPass(pw) {
    let h = 5381;
    for (let i = 0; i < pw.length; i++)
        h = ((h * 33) ^ pw.charCodeAt(i)) >>> 0;
    return h.toString(16);
}

function AuthScreen({ onAuth, notify }) {
    const [mode, setMode] = useState("login");
    const [form, setForm] = useState({ username: "", password: "", fullName: "", school: "Munyumbwe Secondary School" });
    const [busy, setBusy] = useState(false);

    const submit = (e) => {
        e.preventDefault();

            notify("Enter a username and password", "error");
            setBusy(false);
            return;

            if (users.some((u) => u.username === uname)) {
                notify("That username is already taken", "error");
                setBusy(false);
                return;
            }
            const newUser = { username: uname, passwordHash: hashPass(form.password), fullName: form.fullName || uname, school: form.school || "", createdAt: Date.now() };
            saveUsers([...users, newUser]);
            notify(`Welcome, ${newUser.fullName}! Account created.`);
            onAuth(newUser);
        } else {
            const found = users.find((u) => u.username === uname);
            if (!found || found.passwordHash !== hashPass(form.password)) {
                notify("Incorrect username or password", "error");
                setBusy(false);

            }

            onAuth(found);

function App() {
    const [user, setUser] = useState(() => {
        try {
            const r = localStorage.getItem("zg:current_user");
            return r ? JSON.parse(r) : null;
        } catch (_a) {
            return null;
        }
    });
    const [view, setView] = useState("dashboard");
    const [toast, setToast] = useState(null);
    const [sidebarOpen, setSidebarOpen] = useState(false);

    const notify = useCallback((msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3500);
    }, []);

    const handleAuth = (u) => {
        setUser(u);
        try {
            localStorage.setItem("zg:current_user", JSON.stringify(u));
        } catch (_a) { }

    const handleLogout = () => {
        setUser(null);
        try {
