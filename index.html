/* GRADING LOGIC                                                     */
/* ------------------------------------------------------------------ */
const GRADE_BANDS = [
    { min: 90, max: 100, point: 1, label: "Distinction" },
    { min: 80, max: 89, point: 2, label: "Distinction" },
    { min: 70, max: 79, point: 3, label: "Merit" },
    { min: 60, max: 69, point: 4, label: "Merit" },
    { min: 50, max: 59, point: 5, label: "Credit" },
    { min: 40, max: 49, point: 6, label: "Credit" },
    { min: 30, max: 39, point: 7, label: "Satisfactory" },
    { min: 20, max: 29, point: 8, label: "Satisfactory" },
    { min: 0, max: 19, point: 9, label: "Unsatisfactory" },
];

function getGrade(score) {
    if (score === null || score === undefined || score === "" || isNaN(score)) return null;
    const s = Math.max(0, Math.min(100, Number(score)));
    return GRADE_BANDS.find((b) => s >= b.min && s <= b.max) || null;
}

function gradeColor(point) {
    if (point == null) return C.slate;
    if (point <= 2) return "#1B6B3C";
    if (point <= 4) return "#3E8E52";
    if (point <= 6) return C.gold;
    if (point <= 8) return C.copper;
    return C.flagRed;
}

function getDivision(aggregate) {
    if (aggregate <= 16) return { div: "I", label: "Division I", color: "#1B6B3C" };
    if (aggregate <= 22) return { div: "II", label: "Division II", color: "#3E8E52" };
    if (aggregate <= 29) return { div: "III", label: "Division III", color: C.gold };
    if (aggregate <= 34) return { div: "IV", label: "Division IV", color: C.copper };
    return { div: "F", label: "Fail", color: C.flagRed };
}

function computeStudent(student, subjects) {
    const points = [];
    let sum = 0, count = 0;
    subjects.forEach((sub) => {
        const raw = student.scores ? student.scores[sub] : null;
        if (raw !== null && raw !== undefined && raw !== "") {
            const n = Number(raw);
            const g = getGrade(n);
            if (g) {
                points.push(g.point);
                sum += n;
                count++;
            }
        }
    });
    const avg = count ? sum / count : null;
    let division = null;
    if (subjects.length >= 6 && points.length >= 6) {
        const best6 = [...points].sort((a, b) => a - b).slice(0, 6);
        const aggregate = best6.reduce((a, b) => a + b, 0);
        division = { aggregate, ...getDivision(aggregate) };
    }
    return { avg, count, division, filled: count === subjects.length && subjects.length > 0 };
}

function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }

}

                React.createElement("p", { style: { color: C.slate, margin: "4px 0 0", fontSize: 14 } }, "Manage student grades, performance, and ECZ divisions")),
            React.createElement(Btn, { onClick: onNewSheet, icon: "plus" }, "Create Sheet")),
        sheets.length === 0 ? (
            React.createElement("div", { style: { background: C.cream, borderRadius: 16, border: `1.5px dashed ${C.line}`, padding: 48, textAlign: "center" } },
                React.createElement(Icon, { name: "cap", size: 40, color: C.copper, style: { marginBottom: 12 } }),
                React.createElement("h3", { style: { margin: 0, color: C.forest } }, "No mark sheets yet"),
                React.createElement("p", { style: { color: C.slate, maxWidth: 360, margin: "8px auto 20px", fontSize: 14 } }, "Create your first mark sheet to begin tracking student grades."),
                React.createElement(Btn, { onClick: onNewSheet, icon: "plus" }, "New Sheet"))
        ) : (
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 18 } },
                sheets.map((s) => (

                        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 } },
                            React.createElement("h3", { style: { margin: 0, fontSize: 18, fontFamily: "Fraunces, serif", color: C.forest } }, s.title || "Untitled Sheet"),
                            React.createElement("button", { onClick: (e) => { e.stopPropagation(); onDeleteSheet(s.id); }, style: { background: "none", border: "none", color: C.slate, cursor: "pointer" } },
                                React.createElement(Icon, { name: "trash", size: 16 }))),
                        React.createElement("div", { style: { fontSize: 13, color: C.slate, marginBottom: 14 } },
                            s.students ? s.students.length : 0, " Students • ", s.subjects ? s.subjects.length : 0, " Subjects"),
                        React.createElement("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
                            (s.subjects || []).slice(0, 4).map((sub) => (

}

/* ------------------------------------------------------------------ */
/* SHEET EDITOR SCREEN                                                */
/* ------------------------------------------------------------------ */
function SheetEditor({ sheet, onSave, onBack, notify }) {
    const [title, setTitle] = useState(sheet.title || "");
    const [subjects, setSubjects] = useState(sheet.subjects || ["English", "Mathematics", "Science", "Social Studies"]);
    const [students, setStudents] = useState(sheet.students || []);
    const [newSub, setNewSub] = useState("");
    const [newStudName, setNewStudName] = useState("");

    const addSubject = () => {
        if (!newSub.trim()) return;
        if (subjects.includes(newSub.trim())) { notify("Subject exists", "warn"); return; }
        setSubjects([...subjects, newSub.trim()]);
        setNewSub("");
    };

    const addStudent = () => {
        if (!newStudName.trim()) return;
        setStudents([...students, { id: uid(), name: newStudName.trim(), scores: {} }]);
        setNewStudName("");
    };

    const updateScore = (studId, sub, score) => {
        setStudents(students.map((s) => {
            if (s.id !== studId) return s;
            return { ...s, scores: { ...s.scores, [sub]: score } };
        }));
    };

    const handleSave = () => {
        onSave({ ...sheet, title, subjects, students });
        notify("Sheet saved");
    };

    const exportCSV = () => {
        let csv = "Student Name," + subjects.join(",") + ",Average,Division\n";
        students.forEach((s) => {
            const res = computeStudent(s, subjects);
            const row = [s.name];
            subjects.forEach((sub) => row.push(s.scores[sub] || ""));
            row.push(res.avg ? res.avg.toFixed(1) : "");
            row.push(res.division ? res.division.label : "");
            csv += row.join(",") + "\n";
        });
        const blob = new Blob([csv], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${title || "mark_sheet"}.csv`;
        a.click();
    };

    const chartData = useMemo(() => {
        return subjects.map((sub) => {
            let sum = 0, count = 0;
            students.forEach((s) => {
                const sc = Number(s.scores[sub]);
                if (!isNaN(sc) && s.scores[sub] !== "") { sum += sc; count++; }
            });
            return { subject: sub, average: count ? Math.round(sum / count) : 0 };
        });
    }, [subjects, students]);

    return (React.createElement("div", { style: { padding: "24px 16px", maxWidth: 1100, margin: "0 auto" } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 } },
            React.createElement(Btn, { onClick: onBack, variant: "ghost", small: true }, "Back to Dashboard"),
            React.createElement("div", { style: { display: "flex", gap: 10 } },
                React.createElement(Btn, { onClick: exportCSV, variant: "subtle", icon: "download", small: true }, "Export CSV"),
                React.createElement(Btn, { onClick: handleSave, icon: "save", small: true }, "Save Changes"))),
        
        React.createElement("input", {
            style: { ...inputStyle, fontSize: 22, fontWeight: 700, fontFamily: "Fraunces, serif", background: "transparent", border: "none", borderBottom: `2px solid ${C.line}`, borderRadius: 0, paddingLeft: 0, marginBottom: 20 },
            value: title, onChange: (e) => setTitle(e.target.value), placeholder: "Sheet Title (e.g. Grade 9 - Term 1)"
        }),

        React.createElement("div", { style: { background: C.cream, borderRadius: 14, border: `1.5px solid ${C.line}`, padding: 16, marginBottom: 20 } },
            React.createElement("h4", { style: { margin: "0 0 10px", color: C.forest } }, "Subjects"),
            React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 } },
                subjects.map((sub) => (
                    React.createElement("span", { key: sub, style: { background: C.sandDeep, padding: "4px 10px", borderRadius: 6, fontSize: 13, display: "flex", alignItems: "center", gap: 6 } },
                        sub,
                        React.createElement("button", { onClick: () => setSubjects(subjects.filter((s) => s !== sub)), style: { border: "none", background: "none", cursor: "pointer", padding: 0, color: C.flagRed } }, "×"))
                ))),
            React.createElement("div", { style: { display: "flex", gap: 8, maxWidth: 300 } },
                React.createElement("input", { style: inputStyle, value: newSub, onChange: (e) => setNewSub(e.target.value), placeholder: "New subject name" }),
                React.createElement(Btn, { onClick: addSubject, small: true }, "Add"))),

        React.createElement("div", { style: { overflowX: "auto", background: C.cream, borderRadius: 14, border: `1.5px solid ${C.line}`, marginBottom: 24 } },
            React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: 13.5 } },
                React.createElement("thead", null,
                    React.createElement("tr", { style: { background: C.sand, borderBottom: `1.5px solid ${C.line}` } },
                        React.createElement("th", { style: { padding: 12 } }, "Student Name"),
                        subjects.map((s) => React.createElement("th", { key: s, style: { padding: 12, textAlign: "center" } }, s)),
                        React.createElement("th", { style: { padding: 12, textAlign: "center" } }, "Average"),
                        React.createElement("th", { style: { padding: 12, textAlign: "center" } }, "Division"),
                        React.createElement("th", { style: { padding: 12 } }, ""))),
                React.createElement("tbody", null,
                    students.map((stud) => {
                        const res = computeStudent(stud, subjects);
                        return (React.createElement("tr", { key: stud.id, style: { borderBottom: `1px solid ${C.line}` } },
                            React.createElement("td", { style: { padding: 10, fontWeight: 600 } }, stud.name),
                            subjects.map((sub) => {
                                const sc = stud.scores[sub] || "";
                                const g = getGrade(sc);
                                return (React.createElement("td", { key: sub, style: { padding: 6, textAlign: "center" } },
                                    React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", gap: 4 } },
                                        React.createElement("input", {
                                            type: "number", style: { ...inputStyle, width: 50, textAlign: "center", padding: 4 },
                                            value: sc, onChange: (e) => updateScore(stud.id, sub, e.target.value)
                                        }),
                                        React.createElement(GradeBadge, { point: g ? g.point : null, size: 22 })
                                    )));
                            }),
                            React.createElement("td", { style: { padding: 10, textAlign: "center", fontWeight: 700 } }, res.avg ? res.avg.toFixed(1) : "–"),
                            React.createElement("td", { style: { padding: 10, textAlign: "center" } },
                                res.division ? (
                                    React.createElement("span", { style: { color: res.division.color, fontWeight: 700 } }, res.division.div)
                                ) : "–"),
                            React.createElement("td", { style: { padding: 10, textAlign: "right" } },
                                React.createElement("button", { onClick: () => setStudents(students.filter((s) => s.id !== stud.id)), style: { border: "none", background: "none", color: C.slate, cursor: "pointer" } },
                                    React.createElement(Icon, { name: "trash", size: 16 })))
                        ));
                    }))),
            React.createElement("div", { style: { padding: 12, display: "flex", gap: 8, maxWidth: 360 } },
                React.createElement("input", { style: inputStyle, value: newStudName, onChange: (e) => setNewStudName(e.target.value), placeholder: "Add student full name" }),
                React.createElement(Btn, { onClick: addStudent, small: true, icon: "plus" }, "Add"))),

        students.length > 0 && (
            React.createElement("div", { style: { background: C.cream, borderRadius: 14, border: `1.5px solid ${C.line}`, padding: 18 } },
                React.createElement("h4", { style: { margin: "0 0 10px", color: C.forest } }, "Subject Averages Breakdown"),
                React.createElement(SimpleBarChart, { data: chartData, xKey: "subject", yKey: "average", max: 100, suffix: "%" }))
        )));
}

/* ------------------------------------------------------------------ */
/* MAIN APP WRAPPER                                                   */
/* ------------------------------------------------------------------ */
function App() {
    const [user, setUser] = useState(null);
    const [view, setView] = useState("dashboard");
    const [sheets, setSheets] = useState([]);
    const [activeSheetId, setActiveSheetId] = useState(null);
    const [toast, setToast] = useState(null);
    const [mobileOpen, setMobileOpen] = useState(false);

    const notify = (msg, type = "info") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
    };

    useEffect(() => {
        if (user) {
            setSheets(loadSheets(user.username));
        }
    }, [user]);

    const handleSaveSheet = (updated) => {
        const next = sheets.some((s) => s.id === updated.id)
            ? sheets.map((s) => (s.id === updated.id ? updated : s))
            : [...sheets, updated];
        setSheets(next);
        saveSheets(user.username, next);
    };

    const handleDeleteSheet = (id) => {
        const next = sheets.filter((s) => s.id !== id);
        setSheets(next);
        saveSheets(user.username, next);
        notify("Sheet deleted");
    };

    const createNewSheet = () => {
        const newS = { id: uid(), title: "New Grade Sheet", subjects: ["English", "Mathematics", "Science"], students: [] };
        handleSaveSheet(newS);
        setActiveSheetId(newS.id);
        setView("editor");
    };

    if (!user) return React.createElement(AuthScreen, { onAuth: setUser, notify });

    const activeSheet = sheets.find((s) => s.id === activeSheetId);

    return (React.createElement("div", { style: { minHeight: "100vh", display: "flex", background: C.sand } },
        React.createElement(Sidebar, { user, view, setView: (v) => { setView(v); setActiveSheetId(null); }, onLogout: () => setUser(null), onNewSheet: createNewSheet, mobileOpen, setMobileOpen }),
        React.createElement("div", { style: { flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }, className: "zg-main-content" },
            React.createElement("div", { style: { padding: "12px 16px", background: C.cream, borderBottom: `1px solid ${C.line}`, display: "flex", alignItems: "center", gap: 12 }, className: "zg-menu-btn" },
                React.createElement("button", { onClick: () => setMobileOpen(true), style: { background: "none", border: "none", cursor: "pointer", color: C.forest } },
                    React.createElement(Icon, { name: "menu", size: 24 })),
                React.createElement("span", { style: { fontFamily: "Fraunces, serif", fontWeight: 700, fontSize: 18, color: C.forest } }, "ZedGrade")),
            view === "editor" && activeSheet ? (
                React.createElement(SheetEditor, { sheet: activeSheet, onSave: handleSaveSheet, onBack: () => setView("dashboard"), notify })
            ) : (
                React.createElement(Dashboard, { sheets, onSelectSheet: (id) => { setActiveSheetId(id); setView("editor"); }, onDeleteSheet: handleDeleteSheet, onNewSheet: createNewSheet })
            )),
        React.createElement(Toast, { toast })));
}

/* Render to DOM */
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
